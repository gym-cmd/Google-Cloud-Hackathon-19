<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script>(function(){var t=localStorage.getItem('theme')||'light',d=document.documentElement;if(t==='dark'||(t==='system'&&window.matchMedia('(prefers-color-scheme:dark)').matches)){d.classList.replace('light','dark')}})()</script>
<title>Learning Quiz</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b981",
                        "accent-orange": "#f97316",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "whimsical": ["Fredoka", "sans-serif"],
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --primary-color: #10b981;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        .liquid-fill {
            background: linear-gradient(90deg, #10b981 0%, #34d399 100%);
            position: relative;
        }
        .cartoon-icon-btn {
            @apply flex items-center justify-center rounded-2xl border-b-4 active:border-b-0 active:translate-y-[2px] transition-all;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
      opacity: 0;
      transition: opacity 0.15s;
    }
    /* Radio button visual state — works with hidden peer input */
    input.peer:checked ~ div .radio-dot {
      border-color: var(--primary-color);
      background-color: var(--primary-color);
    }
    input.peer:checked ~ div .radio-inner {
      opacity: 1;
    }
  </style>
  <script>document.addEventListener('DOMContentLoaded',function(){requestAnimationFrame(function(){document.body.style.opacity='1'})})</script>
  </head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="relative w-full max-w-[1200px] aspect-video bg-white dark:bg-slate-900 shadow-2xl rounded-3xl overflow-hidden flex border border-slate-200 dark:border-slate-800">
<aside class="w-72 bg-slate-50 dark:bg-slate-900/50 border-r border-slate-200 dark:border-slate-800 flex flex-col p-8">
<div class="mb-12">
<a href="/chat" class="flex items-center gap-3 mb-6 hover:opacity-80 transition-opacity">
<div class="size-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl font-bold">terminal</span>
</div>
<span class="font-bold text-lg tracking-tight">AI Tutor</span>
</a>
<h1 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Current Module</h1>
<p class="font-semibold text-slate-800 dark:text-white leading-tight" id="quiz-module-label">Assessment-based knowledge check</p>
</div>
<nav class="space-y-2 flex-1">
<div class="flex items-center gap-3 p-3 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm">
<span class="material-symbols-outlined text-primary text-xl">task_alt</span>
<span class="text-sm font-medium">Concept Quiz</span>
</div>
<div class="flex items-center gap-3 p-3 rounded-xl opacity-40">
<span class="material-symbols-outlined text-xl">lock</span>
<span class="text-sm font-medium">Practical Lab</span>
</div>
</nav>
<a href="/chat" class="cartoon-icon-btn bg-slate-200 dark:bg-slate-800 border-slate-300 dark:border-slate-700 p-4 w-full group">
<span class="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform">home</span>
</a>
</aside>
<main class="flex-1 flex flex-col bg-white dark:bg-slate-900">
<header class="px-12 py-8 flex items-center justify-between gap-12">
<div class="flex-1">
<div class="flex justify-between items-end mb-3">
<span class="text-sm font-bold text-slate-400" id="quiz-step-label">Question 1 of 3</span>
<span class="font-whimsical text-primary font-bold">Answer carefully</span>
</div>
<div class="h-4 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden border-2 border-slate-100 dark:border-slate-800 relative">
<div class="liquid-fill h-full rounded-full transition-all duration-700" id="quiz-progress-fill" style="width: 33%;">
<div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 size-8 bg-white dark:bg-slate-700 rounded-full border-2 border-primary shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-lg animate-bounce">rocket</span>
</div>
</div>
</div>
</div>
<div class="flex gap-3">
<button class="cartoon-icon-btn size-12 bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-400" title="Get a hint" onclick="window.location.href='/chat'">
<span class="material-symbols-outlined">lightbulb</span>
</button>
<button class="cartoon-icon-btn size-12 bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-400" title="Learning Context" onclick="window.location.href='/context'">
<span class="material-symbols-outlined">assignment_ind</span>
</button>
</div>
</header>
<div class="flex-1 px-12 py-4 overflow-y-auto">
<div class="max-w-3xl">
<h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-8 leading-snug" id="quiz-question"></h2>
<div class="space-y-4" id="quiz-options"></div>
<p class="mt-6 text-sm font-medium text-slate-500 dark:text-slate-400 min-h-6" id="quiz-feedback"></p>
</div>
</div>
<footer class="p-10 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
<div class="flex items-center gap-4">
<span class="font-whimsical text-2xl font-bold text-accent-orange">You've got this!</span>
</div>
<div class="flex gap-4">
<a href="/roadmap" class="px-8 py-3 rounded-xl font-bold text-slate-500 hover:text-slate-700 dark:text-slate-400 transition-colors">
                        Skip
                    </a>
<button id="check-answer-btn" onclick="checkAnswer()" class="cartoon-icon-btn bg-primary border-green-700 px-10 py-3 text-white font-bold flex items-center gap-2 text-lg shadow-lg shadow-primary/20">
                        Check Answer
                        <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>
</footer>
</main>
</div>

<script>
const defaultQuestions = [
    {
        question: "In the context of LLM prompting, what is the primary difference between zero-shot and few-shot techniques?",
        options: [
            "Zero-shot provides no examples, while few-shot provides one or more examples to guide output.",
            "Zero-shot is used for training, while few-shot is only used during inference.",
            "Few-shot requires retraining the model weights with prompt-specific data.",
        ],
        correctIndex: 0,
    },
    {
        question: "Why is structured context important when building a personalized tutoring experience?",
        options: [
            "It lets the assistant tailor explanations and next steps to the learner's goal and level.",
            "It removes the need to ask the learner any clarifying questions.",
            "It guarantees every generated answer will be factually correct.",
        ],
        correctIndex: 0,
    },
    {
        question: "What should happen after a learner fails a quiz in this product architecture?",
        options: [
            "The next module should unlock automatically so momentum is not lost.",
            "The tutor should give a targeted revision hint and let the learner retry.",
            "The assessment conversation should restart from the beginning.",
        ],
        correctIndex: 1,
    },
];

const quizState = {
    questions: defaultQuestions,
    currentIndex: 0,
    score: 0,
    answers: [],
};

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function loadQuizData() {
    const storedCurriculum = localStorage.getItem('eduai.curriculum');
    if (storedCurriculum) {
        document.getElementById('quiz-module-label').textContent = 'Curriculum step knowledge check';
    }
    renderQuestion();
}

function renderQuestion() {
    const currentQuestion = quizState.questions[quizState.currentIndex];
    document.getElementById('quiz-question').textContent = currentQuestion.question;
    document.getElementById('quiz-step-label').textContent = `Question ${quizState.currentIndex + 1} of ${quizState.questions.length}`;
    document.getElementById('quiz-progress-fill').style.width = `${((quizState.currentIndex + 1) / quizState.questions.length) * 100}%`;
    document.getElementById('quiz-feedback').textContent = '';

    const optionsContainer = document.getElementById('quiz-options');
    optionsContainer.innerHTML = currentQuestion.options.map((option, index) => `
        <label class="block cursor-pointer group">
            <input class="hidden peer" name="ai-quiz" type="radio" value="${index}"/>
            <div class="p-5 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 transition-all peer-checked:border-primary peer-checked:bg-primary/5 group-hover:border-slate-300 dark:group-hover:border-slate-700">
                <div class="flex items-center gap-4">
                    <div class="radio-dot size-6 rounded-full border-2 border-slate-300 dark:border-slate-600 flex items-center justify-center">
                        <div class="radio-inner size-2 bg-white rounded-full opacity-0"></div>
                    </div>
                    <p class="text-slate-700 dark:text-slate-200 font-medium">${escapeHtml(option)}</p>
                </div>
            </div>
        </label>
    `).join('');
}

function checkAnswer() {
    const selected = document.querySelector('input[name="ai-quiz"]:checked');
    if (!selected) {
        alert('Please select an answer first.');
        return;
    }

    const selectedIndex = Number(selected.value);
    const currentQuestion = quizState.questions[quizState.currentIndex];
    const isCorrect = selectedIndex === currentQuestion.correctIndex;
    quizState.answers.push({
        question: currentQuestion.question,
        selectedIndex,
        correctIndex: currentQuestion.correctIndex,
        isCorrect,
        selectedText: currentQuestion.options[selectedIndex],
        correctText: currentQuestion.options[currentQuestion.correctIndex],
    });

    if (isCorrect) {
        quizState.score += 1;
    }

    if (quizState.currentIndex < quizState.questions.length - 1) {
        document.getElementById('quiz-feedback').textContent = isCorrect ? 'Correct. Moving to the next question.' : 'Not quite. The correct answer will be shown in the results summary.';
        quizState.currentIndex += 1;
        setTimeout(renderQuestion, 350);
        return;
    }

    localStorage.setItem('eduai.quizResult', JSON.stringify({
        score: quizState.score,
        total: quizState.questions.length,
        passed: quizState.score >= 2,
        answers: quizState.answers,
    }));
    window.location.href = '/quiz-results';
}

loadQuizData();
</script>
<div style="position:fixed;bottom:1.5rem;left:1.5rem;z-index:9999"><button onclick="cycleTheme()" class="flex items-center gap-2 px-3 py-2.5 rounded-full bg-white/90 dark:bg-slate-800/90 backdrop-blur border border-slate-200 dark:border-slate-700 shadow-lg hover:shadow-xl transition-all text-slate-600 dark:text-slate-300" title="Toggle theme"><span id="theme-icon" class="material-symbols-outlined text-lg">light_mode</span><span id="theme-label" class="text-xs font-medium">Light</span></button></div>
<script>
function cycleTheme(){var m=['light','dark','system'],c=localStorage.getItem('theme')||'light',n=m[(m.indexOf(c)+1)%3];localStorage.setItem('theme',n);applyTheme(n)}
function applyTheme(t){var d=document.documentElement,dk=t==='dark'||(t==='system'&&window.matchMedia('(prefers-color-scheme:dark)').matches);d.classList.toggle('dark',dk);d.classList.toggle('light',!dk);updateThemeIcon(t)}
function updateThemeIcon(t){var i=document.getElementById('theme-icon'),l=document.getElementById('theme-label');if(i)i.textContent=t==='dark'?'dark_mode':t==='system'?'monitor':'light_mode';if(l)l.textContent=t==='dark'?'Dark':t==='system'?'System':'Light'}
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){if(localStorage.getItem('theme')==='system')applyTheme('system')});updateThemeIcon(localStorage.getItem('theme')||'light');
</script>
</body></html>
